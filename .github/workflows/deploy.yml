name: Deploy to Vercel

on:
  push:
    branches:
      - main
      - feature/saravana-ui-updates
      - feature/rose-theme

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: innovatiq-web/package-lock.json

      - name: Install dependencies
        working-directory: innovatiq-web
        run: npm ci

      - name: Build
        working-directory: innovatiq-web
        run: npm run build

      - name: Deploy to Vercel
        working-directory: innovatiq-web
        run: npx vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
